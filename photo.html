<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaikishan Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0; padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  font-family:'Inter', sans-serif;
  background:linear-gradient(135deg,#fceff9,#f8edff,#fef6e4);
  color:#222;
  transition:0.4s ease;
  overflow-x:hidden;
}

/* DARK MODE */
body.dark{
  background:#0e0e11;
  color:#eee;
}

/* LOADING SCREEN */
.loader{
  position:fixed;
  top:0; left:0;
  width:100%; height:100vh;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:5000;
  transition:0.5s;
}
.loader.hidden{ opacity:0; pointer-events:none; }
.loader span{
  width:35px; height:35px;
  border:4px solid #fff;
  border-radius:50%;
  border-top-color:transparent;
  animation:spin 1s infinite linear;
}
@keyframes spin{ 100%{ transform:rotate(360deg);} }

/* MOUSE FOLLOW LIGHT */
#mouseLight{
  position:fixed;
  width:250px; height:250px;
  background:radial-gradient(circle, rgba(255,255,255,0.28), transparent 70%);
  border-radius:50%;
  pointer-events:none;
  transform:translate(-50%, -50%);
  mix-blend-mode:soft-light;
  z-index:2;
  transition:0.06s;
}

/* FILM GRAIN */
.film-grain{
  position:fixed;
  top:-50%; left:-50%;
  width:200%; height:200%;
  pointer-events:none;
  background:url("https://grainy-gradients.vercel.app/noise.svg");
  opacity:0.06;
  animation:grain 9s steps(8) infinite;
  z-index:1;
}
@keyframes grain{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(-4%,4%);}
}

/* PARTICLES */
.particles span{
  position:fixed;
  bottom:-120px;
  width:15px; height:15px;
  border-radius:50%;
  background:rgba(255,182,193,0.35);
  animation:float 25s linear infinite;
}
.particles span:nth-child(odd){
  background:rgba(221,160,221,0.35);
}
.particles span:nth-child(3n){
  background:rgba(255,228,225,0.4);
}
@keyframes float{
  0%{transform:translateY(0) scale(1); opacity:0;}
  10%{opacity:1;}
  100%{transform:translateY(-130vh) scale(1.25); opacity:0;}
}

/* HEADER */
header{
  text-align:center;
  padding:130px 20px 70px;
  position:relative;
}
header h1{
  font-family:'Playfair Display', serif;
  font-size:62px;
  letter-spacing:5px;
  opacity:0;
  transform:translateY(40px);
  animation:titleAnim 1.5s forwards ease-out;
}
@keyframes titleAnim{
  to{ opacity:1; transform:translateY(0); }
}
header p{
  margin-top:14px;
  font-size:15px;
  opacity:0.6;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:center;
  gap:50px;
  padding:20px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.25);
  position:sticky;
  top:0; z-index:200;
  border-bottom:1px solid rgba(255,255,255,0.4);
}
body.dark .navbar{ background:rgba(40,40,50,0.45); }

.navbar a{
  text-decoration:none;
  font-weight:500;
  color:#333;
  position:relative;
}
body.dark .navbar a{ color:#eee; }

.navbar a::after{
  content:'';
  position:absolute;
  bottom:-6px; left:0;
  width:0%; height:2px;
  background:#ff9daf;
  transition:0.3s;
}
.navbar a:hover::after{ width:100%; }

/* SECTION ANIMATION */
.section{
  padding:100px 12%;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}
.section.show{
  opacity:1;
  transform:translateY(0);
}

.section h2{
  font-family:'Playfair Display', serif;
  font-size:36px;
  margin-bottom:45px;
  text-transform:uppercase;
  letter-spacing:4px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:35px;
}

.image-box{
  position:relative;
  overflow:hidden;
  border-radius:18px;
  cursor:pointer;
  filter:blur(0);
  transition:0.5s;
  animation:floatSoft 6s ease-in-out infinite;
}
@keyframes floatSoft{
  0%,100%{ transform:translateY(0); }
  50%{ transform:translateY(-18px); }
}

.image-box img{
  width:100%;
  height:380px;
  object-fit:cover;
  transition:0.5s;
  filter:brightness(0.9);
}

.image-box:hover img{
  transform:scale(1.1);
  filter:blur(2px) brightness(0.6);
}

/* CAPTION */
.caption{
  position:absolute;
  bottom:0;
  width:100%;
  background:rgba(255,255,255,0.5);
  backdrop-filter:blur(6px);
  padding:18px;
  font-size:14px;
  transform:translateY(100%);
  transition:0.5s;
}
body.dark .caption{ background:rgba(40,40,40,0.5); }

.image-box:hover .caption{
  transform:translateY(0);
}

/* PARALLAX SECTIONS */
.section.parallax{
  background-attachment:fixed;
  background-size:cover;
  background-position:center;
  border-radius:20px;
  margin-bottom:70px;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:90px;
}
.contact button{
  padding:15px 38px;
  border:none;
  border-radius:40px;
  background:#e5989b;
  color:white;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}
.contact button:hover{ background:#d67a84; }

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0; left:0;
  width:100%; height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.9);
  opacity:0; pointer-events:none;
  transition:0.4s;
  z-index:3000;
}
.lightbox.active{ opacity:1; pointer-events:auto; }
.lightbox img{
  max-width:80%;
  max-height:80%;
  border-radius:12px;
}

/* TOGGLE */
.toggle{
  position:fixed;
  top:20px; right:20px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#333; color:#fff;
  cursor:pointer; z-index:4000;
}

</style>
</head>
<body>

<div class="loader"><span></span></div>

<div id="mouseLight"></div>
<div class="film-grain"></div>

<div class="particles">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<button class="toggle" onclick="toggleDark()">Dark Mode</button>

<header>
<h1>JAIKISHAN'S GALLERY</h1>
<p>Photography is the art of capturing feelings, not moments.</p>
</header>

<div class="navbar">
<a href="#street">Street</a>
<a href="#nature">Nature</a>
<a href="#portraits">Portraits</a>
<a href="#contact">Contact</a>
</div>

<!-- STREET -->
<section class="section" id="street">
<h2>Street</h2>
<div class="gallery">
<div class="image-box"><img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7"><div class="caption">City Whispers</div></div>
<div class="image-box"><img src="https://images.unsplash.com/photo-1508051123996-69f8caf4891e"><div class="caption">Midnight Corners</div></div>
<div class="image-box"><img src="https://images.unsplash.com/photo-1520975918318-3a2f8b15d79f"><div class="caption">Urban Poetry</div></div>
</div>
</section>

<!-- NATURE -->
<section class="section parallax" id="nature" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470');">
<h2>Nature</h2>
<div class="gallery">
<div class="image-box"><img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee"><div class="caption">Soft Horizons</div></div>
<div class="image-box"><img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"><div class="caption">Dream Coast</div></div>
</div>
</section>

<!-- PORTRAITS -->
<section class="section" id="portraits">
<h2>Portraits</h2>
<div class="gallery">
<div class="image-box"><img src="https://images.unsplash.com/photo-1517841905240-472988babdf9"><div class="caption">Quiet Strength</div></div>
<div class="image-box"><img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330"><div class="caption">Soft Gaze</div></div>
<div class="image-box"><img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1"><div class="caption">Elegance</div></div>
</div>
</section>

<section class="contact" id="contact">
<h2>Let's Create Together</h2>
<button onclick="alert('📞 +91 98765 43210')">Reveal Contact</button>
</section>

<div class="lightbox" id="lightbox">
<img id="lightbox-img">
</div>

<script>

/* LOADING SCREEN */
window.onload = ()=>{
  setTimeout(()=>{ 
    document.querySelector(".loader").classList.add("hidden");
  },800);
};

/* LIGHTBOX */
document.querySelectorAll(".image-box img").forEach(img=>{
  img.onclick = ()=>{
    document.getElementById("lightbox").classList.add("active");
    document.getElementById("lightbox-img").src = img.src;
  };
});
document.getElementById("lightbox").onclick = ()=>{
  document.getElementById("lightbox").classList.remove("active");
};

/* SCROLL ANIM */
const sections = document.querySelectorAll(".section");
window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

/* DARK MODE TOGGLE */
function toggleDark(){ document.body.classList.toggle("dark"); }

/* MOUSE FOLLOW LIGHT */
const light = document.getElementById("mouseLight");
document.addEventListener("mousemove", (e)=>{
  light.style.left = e.clientX + "px";
  light.style.top = e.clientY + "px";
});

</script>

</body>
</html>
